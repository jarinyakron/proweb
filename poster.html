<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>โปสเตอร์</title>

<style>
body {
  font-family: 'Mitr', sans-serif;
  background: linear-gradient(135deg, #fff8e1, #fff3c4);
  margin: 0;
  text-align: center;
}

/* ใช้ style เดิมเหมือนทุกหน้า */
h1 { margin-top:60px; font-size:40px; color:#b8860b; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:25px;
  padding:40px;
}

.item {
  background:white;
  padding:12px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.item:hover { transform:translateY(-10px) scale(1.05); }

.item img {
  width:100%;
  border-radius:15px;
}

.item p {
  margin-top:10px;
  color:#b8860b;
}

.back {
  display:inline-block;
  margin:40px;
  padding:14px 30px;
  background:linear-gradient(45deg,gold,orange);
  color:white;
  border-radius:15px;
  text-decoration:none;
}
</style>

</head>

<body>

<h1>โปสเตอร์ 🎨</h1>

<div class="grid">

  <div class="item">
    <img src="imge/stkgloss16.jpg">
    <p>โปสเตอร์โฆษณา</p>
  </div>

  <div class="item">
    <img src="imge/stkgloss16.jpg">
    <p>โปสเตอร์ร้านค้า</p>
  </div>

</div>

<a href="index.html" class="back">← กลับ</a>

</body>
</html>
