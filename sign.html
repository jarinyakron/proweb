<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>งานป้าย</title>
<style>
body{font-family:'Mitr',sans-serif;background:linear-gradient(135deg,#fff8e1,#fff3c4);text-align:center;}
h1{margin-top:60px;color:#b8860b;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:25px;padding:40px;}
.item{background:white;padding:12px;border-radius:20px;transition:0.3s;}
.item:hover{transform:scale(1.05);}
.item img{width:100%;border-radius:15px;}
.item p{color:#b8860b;}
.back{display:inline-block;margin:40px;padding:14px 30px;background:gold;color:white;border-radius:15px;text-decoration:none;}
</style>
</head>

<body>
<h1>งานป้าย 🪧</h1>

<div class="grid">
  <div class="item"><img src="imge/stkgloss16.jpg"><p>ป้ายไวนิล</p></div>
  <div class="item"><img src="imge/stkgloss16.jpg"><p>Roll up</p></div>
</div>

<a href="index.html" class="back">← กลับ</a>
</body>
</html>
