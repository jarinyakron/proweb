<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>นามบัตร</title>

<style>
body {
  font-family: 'Mitr', sans-serif;
  background: linear-gradient(135deg, #fff8e1, #fff3c4);
  margin: 0;
  text-align: center;
}

h1 {
  margin-top: 60px;
  font-size: 40px;
  color: #b8860b;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 25px;
  padding: 40px;
}

.item {
  background: white;
  padding: 12px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.item::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,215,0,0.4), transparent);
  top: -100%;
  left: -100%;
  transition: 0.5s;
}

.item:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 15px 30px rgba(255,215,0,0.4);
}

.item:hover::before {
  top: 100%;
  left: 100%;
}

.item img {
  width: 100%;
  border-radius: 15px;
  transition: 0.3s;
}

.item:hover img {
  transform: scale(1.1);
}

.item p {
  margin-top: 10px;
  font-size: 16px;
  color: #b8860b;
}

.back {
  display: inline-block;
  margin: 40px;
  padding: 14px 30px;
  background: linear-gradient(45deg, gold, orange);
  color: white;
  border-radius: 15px;
  text-decoration: none;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(255,200,0,0.4);
}

.back:hover {
  transform: scale(1.1);
  box-shadow: 0 10px 25px rgba(255,200,0,0.6);
}
</style>

</head>

<body>

<h1>นามบัตร 💼</h1>

<div class="grid">

  <div class="item">
    <img src="imge/stkgloss16.jpg">
    <p>นามบัตรกระดาษอาร์ต</p>
  </div>

  <div class="item">
    <img src="imge/stkgloss16.jpg">
    <p>นามบัตรเคลือบด้าน</p>
  </div>

  <div class="item">
    <img src="imge/stkgloss16.jpg">
    <p>นามบัตรเคลือบเงา</p>
  </div>

  <div class="item">
    <img src="imge/stkgloss16.jpg">
    <p>นามบัตรพลาสติก</p>
  </div>

</div>

<a href="index.html" class="back">← กลับ</a>

</body>
</html>
